services:
  web:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* vars are inlined by Next.js at build time.
        # Change these and rebuild (`docker compose build`) for them to take effect.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-test.jana.earth}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-https://auth-dev.jana.earth}
        NEXT_PUBLIC_DEMO_USE_MOCKS: ${NEXT_PUBLIC_DEMO_USE_MOCKS:-false}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
